<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Login - PLEROMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <h1>PLEROMA</h1>
      <p>Find local sports activities, join nearby players, and connect safely.</p>
    </div>

    <div class="auth-card">
      <h2>Login</h2>
      <p class="subtitle">Welcome back to PLEROMA</p>

      <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username or email" required>
        <div class="password-wrapper">
  <input type="password" name="password" id="loginPassword" placeholder="Password" required>
  <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁️</button>
</div>
        <button type="submit">Login</button>
      </form>

      <p class="auth-switch">
        Don’t have an account?
        <a href="register.html">Create one</a>
      </p>
    </div>
    <div class="site-footer">PLEROMA · Sports activity platform</div>
  </div>
</body>
</html>
