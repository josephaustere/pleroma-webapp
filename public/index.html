<!DOCTYPE html>
<html>
<head>
  <title>PLEROMA - Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">

  <div class="landing-container">
    <div class="landing-left">
      <h1>PLEROMA</h1>
      <p class="tagline">Find people nearby for sports, fitness, and active moments.</p>

      <div class="feature-list">
        <p>📍 Discover activities near you</p>
        <p>⚽ Join sports sessions</p>
        <p>👥 Connect with like-minded people</p>
        <p>✅ Organisers approve join requests</p>
      </div>
    </div>

    <div class="landing-right">
      <div class="auth-tabs">
        <div class="auth-box">
          <h2>Login</h2>
          <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
          </form>
        </div>

        <div class="auth-box">
          <h2>Create Account</h2>
          <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose username" required>
            <input type="password" name="password" placeholder="Choose password" required>
            <button type="submit">Register</button>
          </form>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
